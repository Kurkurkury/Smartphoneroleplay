name: Android Build

on:
  push:
    branches:
      - main
      - 'finish/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build stable debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Upload stable debug APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartphoneRoleplay-debug-apk
          path: app/build/outputs/apk/debug/*.apk

  assemble-native-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install native Android toolchain
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;27.2.12479018" "cmake;3.22.1"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build native debug APK
        shell: bash
        run: |
          set +e
          gradle :app:assembleDebug --no-daemon -PenableNativeLlama=true > native-build.log 2>&1
          code=$?
          echo "Native build exit code: $code"
          echo "---- native build tail ----"
          tail -n 220 native-build.log || true
          exit $code

      - name: Upload native build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SmartphoneRoleplay-native-build-log
          path: native-build.log

      - name: Upload native debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: SmartphoneRoleplay-native-debug-apk
          path: app/build/outputs/apk/debug/*.apk
