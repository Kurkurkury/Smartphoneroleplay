plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

// Native llama.cpp support is intentionally opt-in. The app must remain buildable
// and usable as a local roleplay prototype even when the native runtime is not
// available on a developer machine, CI runner, emulator, or target phone.
def enableNativeLlama = providers.gradleProperty('enableNativeLlama')
        .map { it.equals('true', true) }
        .orElse(false)
        .get()

android {
    namespace 'com.kurkurkury.smartphoneroleplay'
    compileSdk 35

    defaultConfig {
        applicationId 'com.kurkurkury.smartphoneroleplay'
        minSdk 23
        targetSdk 35
        versionCode 4
        versionName '0.4.0'
        manifestPlaceholders = [
            launcherAction: 'android.intent.action.MAIN',
            launcherCategory: 'android.intent.category.LAUNCHER'
        ]

        if (enableNativeLlama) {
            externalNativeBuild {
                cmake {
                    cppFlags '-std=c++17 -O3'
                }
            }

            ndk {
                abiFilters 'arm64-v8a'
            }
        }
    }

    if (enableNativeLlama) {
        externalNativeBuild {
            cmake {
                path file('src/main/cpp/CMakeLists.txt')
                version '3.22.1'
            }
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}
